<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人員資料呈現</title>
  <!-- 引入 Google Fonts 與 Tailwind CSS 讓網頁變美觀 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f3f4f6;
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-4xl mx-auto">
    <!-- 標題 -->
    <h1 class="text-3xl font-bold text-gray-800 text-center mb-8">🧑‍💼 人員排班與價格表</h1>
    
    <!-- 載入中的動畫提示 -->
    <div id="loading" class="text-center py-12">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent mb-2"></div>
      <p class="text-gray-500">正在讀取試算表資料...</p>
    </div>

    <!-- 資料卡片容器 -->
    <div id="data-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 hidden">
      <!-- 資料會透過 JavaScript 動態填入這裡 -->
    </div>
  </div>

  <script>
    // 當網頁載入完成後，執行後端 GAS 撈取資料
    window.onload = function() {
      google.script.run
        .withSuccessHandler(renderData)
        .withFailureHandler(function(err) {
          document.getElementById('loading').innerHTML = <p class="text-red-500 font-medium">資料載入失敗：${err.message}</p>;
        })
        .getData();
    };

    // 將撈到的資料渲染成卡片的函式
    function renderData(data) {
      const container = document.getElementById('data-container');
      const loading = document.getElementById('loading');
      
      if (data.length === 0) {
        loading.innerHTML = '<p class="text-gray-500">目前沒有資料唷！</p>';
        return;
      }

      let htmlContent = '';
      
      data.forEach(item => {
        htmlContent += `
          <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 hover:shadow-lg transition-shadow duration-300">
            <!-- 卡片頭部：姓名 -->
            <div class="bg-gradient-to-r border-b border-gray-100 p-4">
              <h2 class="text-xl font-bold text-gray-800">${item.name}</h2>
            </div>
            <!-- 卡片內容 -->
            <div class="p-4 space-y-3">
              <div class="flex justify-between items-center text-sm">
                <span class="text-gray-500">💰 價格</span>
                <span class="font-semibold text-emerald-600 text-base">$${Number(item.price).toLocaleString()}</span>
              </div>
              <div class="border-t border-gray-100 pt-2 grid grid-cols-2 gap-2 text-center text-sm">
                <div class="bg-blue-50 rounded-lg p-2">
                  <span class="block text-xs text-blue-500 mb-0.5">☀️ 上班</span>
                  <span class="font-medium text-gray-700">${item.start  '--:--'}</span>
                </div>
                <div class="bg-orange-50 rounded-lg p-2">
                  <span class="block text-xs text-orange-500 mb-0.5">🌙 下班</span>
                  <span class="font-medium text-gray-700">${item.end  '--:--'}</span>
                </div>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = htmlContent;
      loading.classList.add('hidden');       // 隱藏載入中提示
      container.classList.remove('hidden');   // 顯示資料卡片
    }
  </script>
</body>
</html>
